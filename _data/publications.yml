      year      = {2026},
      address   = {Kuala Lumpur, Malaysia}
    }

- id: "14"
  number: "[14]"
  authors: "With Hoang-Quoc-Bao Hua"
  title: "Emerging Trends and Challenges Toward LLM Agents in Static Analysis"
  venue:
    name: "IEA/AIE 2026"
    url: "https://www.i-somet.org/iea-aie2026/cfp.html"
    location: "Kuala Lumpur, Malaysia"
    date: "July 2026"
  tags:
    - text: "Static Analysis"
      class: "verification"
    - text: "LLM Agents"
      class: "nlp"
    - text: "Software Reliability"
      class: "verification"
  links:
    - type: "paper"
      url: "/publication/IEA2026c.pdf"
      icon: "📄"
  abstract: "Static analysis remains crucial for ensuring software reliability and security, yet it frequently struggles with false positives, rigid rule sets, and an inability to reason about semantic context.<br><br>LLM-based agents show promise as a complement to traditional approaches by bringing autonomous reasoning and verification capabilities to the analysis pipeline. This paper introduces a taxonomy that organizes these agents along four key dimensions: architecture, integration patterns, grounding mechanisms, and application domains.<br><br>Our framework captures how agents are structured, where they intervene in existing workflows, how they validate their outputs, and which tasks they address - from defect detection and code maintenance to security auditing. We examine current evaluation practices and surface major limitations around reliability and scalability.<br><br>The paper concludes by distilling lessons from recent work, highlighting open research challenges, and identifying promising directions for future investigation."
  bibtex: |
    @inproceedings{hua2026llmstaticanalysis,
      author    = {Hua, Hoang-Quoc-Bao and Le, Xuan-Bach},
      title     = {Emerging Trends and Challenges Toward LLM Agents in Static Analysis},
      booktitle = {Proceedings of the 39th International Conference on Industrial, Engineering and Other Applications of Applied Intelligent Systems (IEA/AIE 2026)},
      year      = {2026},
      address   = {Kuala Lumpur, Malaysia}
    }

- id: "13"
  number: "[13]"
  authors: "With Thi-Hong-Cuc Le"
  title: "From Black-Box to Glass-Box: Explainable AI for Applied Intelligent Software Systems Across the Software Development Life Cycle"
  venue:
    name: "IEA/AIE 2026"
    url: "https://www.i-somet.org/iea-aie2026/cfp.html"
    location: "Kuala Lumpur, Malaysia"
    date: "July 2026"
  tags:
    - text: "Explainable AI"
      class: "ai"
    - text: "Software Engineering"
      class: "verification"
    - text: "LLM"
      class: "nlp"
  links:
    - type: "paper"
      url: "/publication/IEA2026a.pdf"
      icon: "📄"
  abstract: "Artificial intelligence (AI), particularly large language models (LLMs), is increasingly embedded across the Software Development Life Cycle (SDLC), yet the opacity of these systems limits trust, verification, and certification in software engineering (SE), especially in safety- and regulation-critical domains.<br><br>This paper presents a systematic mapping study (SMS) of explainable AI (XAI) in SE, spanning classical machine learning, deep learning, and LLM-based tools across all SDLC phases. Using an SDLC- and persona-aware taxonomy, we synthesize evidence on explanation techniques, evaluation practices, and deployment contexts.<br><br>Our analysis reveals a pronounced imbalance: XAI research focuses on implementation and testing, while requirements, design, maintenance, and operations remain underexplored. Faithfulness validation and human-centred evaluation are limited, and LLM-based explanations introduce additional risks related to over-trust and pipeline opacity.<br><br>We conclude with a research agenda centered on faithfulness-by-design, persona-aware explanations, and certification-ready XAI pipelines, outlining a path from black-box to glass-box SE in high-stakes intelligent systems."
  bibtex: |
    @inproceedings{le2026glassbox,
      author    = {Le, Thi-Hong-Cuc and Le, Xuan-Bach},
      title     = {From Black-Box to Glass-Box: Explainable AI for Applied Intelligent Software Systems Across the Software Development Life Cycle},
      booktitle = {Proceedings of the 39th International Conference on Industrial, Engineering and Other Applications of Applied Intelligent Systems (IEA/AIE 2026)},
      year      = {2026},
      address   = {Kuala Lumpur, Malaysia}
    }

- id: "12"
  number: "[12]"
  authors: "With Thanh-Hai Tran"
  title: "Industrial Visual Anomaly Detection in Robotics: Methods, Datasets, and Deployable System Architectures"
  venue:
    name: "IEA/AIE 2026"
    url: "https://www.i-somet.org/iea-aie2026/cfp.html"
    location: "Kuala Lumpur, Malaysia"
    date: "July 2026"
  tags:
    - text: "Anomaly Detection"
      class: "ai"
    - text: "Robotics"
      class: "ai"
    - text: "Computer Vision"
      class: "ai"
  links:
    - type: "paper"
      url: "/publication/IEA2026b.pdf"
      icon: "📄"
  abstract: "As collaborative robots (cobots) are increasingly integrated into unstructured environments, intelligent safety systems capable of detecting hazards without relying on extensive labeled data become necessary. This survey reviews deep learning methods for Industrial Visual Anomaly Detection (IVAD), emphasizing their role in robotic safety monitoring.<br><br>Unlike static quality inspection, robotic IVAD must function in real time, handle dynamic scenes, and detect open-set anomalies. Existing approaches are categorized into reconstruction-based, embedding-based, and vision-language model (VLM) paradigms. Relevant benchmarks and robotics-specific datasets are examined, highlighting challenges such as motion, viewpoint shifts, and multimodal sensing.<br><br>Strong benchmark scores do not carry over to robotic deployments, where dynamic scenes, latency limits, and semantic risks apply. This survey treats IVAD as a safety-critical system component, one that requires edge efficiency, low latency, and integration with middleware such as ROS2. The survey closes by mapping open problems and practical design directions for practitioners."
  bibtex: |
    @inproceedings{tran2026ivad,
      author    = {Tran, Thanh-Hai and Le, Xuan-Bach},
      title     = {Industrial Visual Anomaly Detection in Robotics: Methods, Datasets, and Deployable System Architectures},
      booktitle = {Proceedings of the 39th International Conference on Industrial, Engineering and Other Applications of Applied Intelligent Systems (IEA/AIE 2026)},
      year      = {2026},
      address   = {Kuala Lumpur, Malaysia}
    }

- id: "11"
  number: "[11]"
  authors: "With Phong Chung, Kha Le-Minh & Tho Quan"
  title: "VSLIM: A Vietnamese Explicit Slot-Intent Mapping for Joint Multi-Intent Detection and Slot Filling"
  venue:
    name: "ACIIDS 2026"
    url: "https://aciids.pwr.edu.pl/2026/"
    location: "Kaohsiung, Taiwan"
    date: "April 2026"
  tags:
    - text: "NLP"
      class: "nlp"
    - text: "Intent Detection"
      class: "nlp"
    - text: "Slot Filling"
      class: "nlp"
  links:
    - type: "paper"
      url: "/publication/ACIIDS2026b.pdf"
      icon: "📄"
  abstract: "Multi-intent detection and slot filling are fundamental tasks of natural language understanding in task-oriented dialog systems. Early approaches treated them as separate tasks, which undermines the direct connection between intents and their associated slots. This limitation becomes more pronounced when multiple intents are expressed within a single utterance.<br><br>In the Vietnamese language landscape, research on this topic remains limited, largely due to its low-resource status. To address this gap, we introduce <strong>VSLIM</strong>, a joint model designed for multi-intent detection and slot filling in Vietnamese. Inspired by the SLIM framework, VSLIM builds on its foundation with a biaffine classifier that more directly captures the relationship between intents and slots. This design allows the model to better understand and represent the dependencies across sequence labels in multi-intent settings.<br><br>Experiments on the Vietnamese <strong>PhoATIS</strong> dataset and our newly introduced <strong>VPED</strong> corpus show that VSLIM outperforms strong NLU baselines, highlighting its potential for improving Vietnamese task-oriented dialog systems. Code & Data: <a href='https://github.com/dongphong543/VSLIM' target='_blank' style='color: var(--accent);'>https://github.com/dongphong543/VSLIM</a><br><br><strong>Keywords:</strong> Multi-intent detection, Slot filling, Vietnamese language understanding, Joint learning, Explicit mapping"
  bibtex: |
    @inproceedings{le2026vslim,
      author    = {Chung, Phong and Le-Minh, Kha and Le, Xuan-Bach and Quan, Tho},
      title     = {VSLIM: A Vietnamese Explicit Slot-Intent Mapping for Joint Multi-Intent Detection and Slot Filling},
      booktitle = {Proceedings of the 18th Asian Conference on Intelligent Information and Database Systems (ACIIDS 2026)},
      year      = {2026},
      address   = {Kaohsiung, Taiwan}
    }
    
- id: "10"
  number: "[10]"
  authors: "With Khoa Phan & Tho Quan"
  title: "SBV-LawGraph: A Hybrid RAG Approach Integrating Knowledge Graph for the State Bank of Vietnam Legal Documents"
  venue:
    name: "ACIIDS 2026 (Oral)"
    url: "https://aciids.pwr.edu.pl/2026/"
    location: "Kaohsiung, Taiwan"
    date: "April 2026"
  tags:
    - text: "RAG"
      class: "rag"
    - text: "Knowledge Graph"
      class: "rag"
    - text: "LLM"
      class: "nlp"
  links:
    - type: "paper"
      url: "/publication/ACIIDS2026a.pdf"
      icon: "📄"
    - type: "slides"
      url: "/slides/ACIIDS2026a_slides.pptx"
      icon: "📊"
  abstract: "While Retrieval-Augmented Generation (RAG) pipelines often demonstrate strong performance in general settings, they struggle with legal texts, where interpreting structure and relationships between laws is crucial. To address this, we introduce <strong>SBV-LawGraph</strong> – a dual-retrieval framework designed specifically for Vietnamese legal documents.<br><br>It combines semantic retrieval with graph-based reasoning by integrating two modules: a <strong>Legal Retrieval</strong> module using sparse–dense reranking for textual accuracy, and a <strong>Relationship Retrieval</strong> module that traverses a curated Legal Knowledge Graph to capture links such as amendments, citations, and definitions.<br><br>This design enables SBV-LawGraph to generate responses that are not only relevant but also structurally grounded, addressing limitations of standard RAG systems. Evaluations on the <strong>ALQAC2025</strong> and <strong>SBV Legal Questions</strong> datasets show it consistently outperforms strong baselines, highlighting its effectiveness for precise and explainable legal QA.<br><br><strong>Keywords:</strong> Retrieval-Augmented Generation, Knowledge Graph, Natural Language Processing, Question-Answering Systems"
  bibtex: |
    @inproceedings{le2026sbvlawgraph,
      author    = {Phan, Khoa and Le, Xuan-Bach and Quan, Tho},
      title     = {SBV-LawGraph: A Hybrid RAG Approach Integrating Knowledge Graph for the State Bank of Vietnam Legal Documents},
      booktitle = {Proceedings of the 18th Asian Conference on Intelligent Information and Database Systems (ACIIDS 2026)},
      year      = {2026},
      address   = {Kaohsiung, Taiwan}
    }
    
- id: "9"
  number: "[9]"
  authors: "With Dominik, Leon, Alexander & Luke Ong"
  title: "Reinforcement Learning with LTL and Omega-Regular Objectives via Optimality-Preserving Translation to Average Rewards"
  venue:
    name: "NeurIPS 2024"
    url: "https://neurips.cc/Conferences/2024"
    location: "Vancouver, Canada"
    date: "December 2024"
  tags:
    - text: "Reinforcement Learning"
      class: "rl"
    - text: "LTL"
      class: "logic"
    - text: "Omega-Regular"
      class: "logic"
  links:
    - type: "paper"
      url: "/publication/rl24.pdf"
      icon: "📄"
    - type: "poster"
      url: "/slides/irl24-poster.png"
      icon: "📊"
  abstract: "Linear Temporal Logic (LTL) and, more generally, ω-regular objectives are alternatives to traditional discount-sum and average-reward objectives in reinforcement learning (RL), offering improved comprehensibility and explainability.<br><br>In this work, we study the relationship between these objectives. Our main result shows that each RL problem with ω-regular objectives can be reduced to a limit-average reward problem in an optimality-preserving manner via finite-memory reward machines.<br><br>Furthermore, we demonstrate the efficacy of this approach by showing that optimal policies for limit-average problems can be found asymptotically by solving a sequence of discount-sum problems approximately. Consequently, we resolve an open problem: optimal policies for LTL and ω-regular objectives can be learned asymptotically."
  bibtex: |
    @inproceedings{le2024ltlrl,
      author    = {Le, Xuan-Bach and Wagner, Dominik and Witzman, Leon and Rabinovich, Alexander and Ong, Luke},
      title     = {Reinforcement Learning with LTL and {$\omega$}-Regular Objectives via Optimality-Preserving Translation to Average Rewards},
      booktitle = {Advances in Neural Information Processing Systems (NeurIPS 2024)},
      year      = {2024}
    }


- id: "8"
  number: "[8]"
  authors: "With Shang-Wei Lin, Sun Jun & David Sanan"
  title: "A Quantum Interpretation of Separating Conjunction for Local Reasoning of Quantum Programs Based on Separation Logic"
  venue:
    name: "POPL 2022"
    url: "https://popl22.sigplan.org/"
    location: "Philadelphia, USA"
    date: "January 2022"
  tags:
    - text: "Quantum Computing"
      class: "quantum"
    - text: "Separation Logic"
      class: "verification"
    - text: "Program Verification"
      class: "verification"
  links:
    - type: "paper"
      url: "/publication/POPL2022.pdf"
      icon: "📄"
    - type: "slides"
      url: "/slides/POPL2022_slides.pdf"
      icon: "📊"
  abstract: "Quantum programs are not only complicated to design but also challenging to verify, as quantum states can have exponential size and require sophisticated mathematics to encode and manipulate. To address the state-space explosion problem in quantum reasoning, we propose a Hoare-style inference framework that supports local reasoning for quantum programs.<br><br>By providing a quantum interpretation of the separating conjunction, we integrate separation logic into our framework and enable local reasoning via a quantum frame rule analogous to the classical frame rule.<br><br>For evaluation, we apply our framework to verify representative quantum programs, including Deutsch–Jozsa's algorithm and Grover's algorithm."
  bibtex: |
    @inproceedings{le2022quantumsep,
      author    = {Le, Xuan-Bach and Lin, Shang-Wei and Sun, Jun and Sanan, David},
      title     = {A Quantum Interpretation of Separating Conjunction for Local Reasoning of Quantum Programs Based on Separation Logic},
      booktitle = {Proceedings of the ACM SIGPLAN Symposium on Principles of Programming Languages (POPL 2022)},
      year      = {2022}
    }
    
- id: "7"
  number: "[7]"
  authors: "With David Sanan, Sun Jun & Shang-Wei Lin"
  title: "Automatic Verification of Multi-threaded Programs by Inference of Rely-Guarantee Specifications"
  venue:
    name: "ICECCS 2020"
    url: "https://formal-analysis.com/iceccs/2020/"
    location: "Singapore"
    date: "March 2021"
  tags:
    - text: "Program Verification"
      class: "verification"
    - text: "Concurrency"
      class: "verification"
    - text: "Rely-Guarantee"
      class: "verification"
  links:
    - type: "paper"
      url: "/publication/ICECCS2021.pdf"
      icon: "📄"
    - type: "slides"
      url: "/slides/ICECCS2021_slides.pdf"
      icon: "📊"
  abstract: "Rely-Guarantee is a comprehensive technique that supports compositional reasoning for concurrent programs. However, specifying the <em>Rely</em> condition—environment interference—and the <em>Guarantee</em> condition—local transformation of thread state—remains challenging, making their construction a major bottleneck in automation.<br><br>To address this problem, we propose a verification framework that constructs correctness proofs for concurrent programs by automatically inferring suitable Rely-Guarantee conditions. Our framework first builds a Hoare-style sequential proof for each thread, and then applies abstraction refinement to lift these proofs into concurrent ones with appropriate Rely-Guarantee relations.<br><br>Experimental results demonstrate that our approach efficiently proves the correctness of multi-threaded programs.<br><br><strong>Keywords:</strong> Rely-Guarantee, Concurrency, CEGAR"
  bibtex: |
    @inproceedings{le2020relyguarantee,
      author    = {Le, Xuan-Bach and Sanán, David and Sun, Jun and Lin, Shang-Wei},
      title     = {Automatic Verification of Multi-threaded Programs by Inference of Rely-Guarantee Specifications},
      booktitle = {Proceedings of the 25th International Conference on Engineering of Complex Computer Systems (ICECCS 2020)},
      pages     = {43--52},
      year      = {2020}
    }
    
- id: "6"
  number: "[6]"
  authors: "With Pablo Barceló, Chih-Duo Hong, Anthony W. Lin & Reino Niskanen (alphabetical)"
  title: "Monadic Decomposability of Regular Relations"
  venue:
    name: "ICALP 2019"
    url: "https://icalp2019.upatras.gr/"
    location: "Patras, Greece"
    date: "July 2019"
  tags:
    - text: "Automata Theory"
      class: "theory"
    - text: "Logic"
      class: "logic"
    - text: "Complexity"
      class: "theory"
  links:
    - type: "paper"
      url: "/publication/ICALP2019.pdf"
      icon: "📄"
  abstract: "Monadic decomposability — the ability to determine whether a formula in a given logical theory can be decomposed into a Boolean combination of monadic formulas — is a powerful tool for devising decision procedures. In this paper, we revisit a classical decision problem in automata theory: given a regular (synchronized rational) relation, determine whether it is recognizable, i.e., whether it admits a monadic decomposition as a Boolean combination of Cartesian products of regular languages.<br><br>Regular relations are highly expressive and, under suitable encodings, capture relations definable in Presburger Arithmetic. Their expressive power coincides with relations definable in universal automatic structures, equivalently those definable by finite set interpretations in WS1S (Weak Second Order Theory of One Successor).<br><br>While decidability of this problem was known (and exponential time for binary relations), its exact complexity remained open. Our main contribution is to fully settle the complexity of this decision problem by developing new techniques based on infinite Ramsey theory. We show that the problem is <strong>NLOGSPACE-complete</strong> for DFA representations and <strong>PSPACE-complete</strong> for NFA representations of regular relations."
  bibtex: |
    @inproceedings{le2019monadic,
      author    = {Barceló, Pablo and Hong, Chih-Duo and Le, Xuan-Bach and Lin, Anthony W. and Niskanen, Reino},
      title     = {Monadic Decomposability of Regular Relations},
      booktitle = {Proceedings of the 46th International Colloquium on Automata, Languages, and Programming (ICALP 2019)},
      series    = {LIPIcs},
      volume    = {132},
      pages     = {103:1--103:14},
      year      = {2019}
    }
    
- id: "5"
  number: "[5]"
  authors: "With Aquinas Hobor & Anthony W. Lin"
  title: "Complexity Analysis of Tree Share Structure"
  venue:
    name: "APLAS 2018"
    url: "https://link.springer.com/book/10.1007/978-3-030-02768-1"
    location: "Wellington, New Zealand"
    date: "December 2018"
  tags:
    - text: "Separation Logic"
      class: "verification"
    - text: "Complexity"
      class: "theory"
    - text: "Fractional Permissions"
      class: "verification"
  links:
    - type: "paper"
      url: "/publication/aplas18.pdf"
      icon: "📄"
    - type: "slides"
      url: "/slides/aplas18_slides.pdf"
      icon: "📊"
  abstract: "The tree share structure proposed by Dockins et al. provides an elegant model for tracking disjoint ownership in concurrent separation logic. However, decision procedures for tree shares are difficult to implement due to the lack of a systematic theoretical study.<br><br>We show that the first-order theory of the full Boolean algebra of tree shares (with all tree-share constants) is decidable and has the same complexity as the first-order theory of Countable Atomless Boolean Algebras.<br><br>We further prove that combining this additive structure with a constant-restricted unary multiplicative \"relativization\" operator yields a non-elementary lower bound. We analyze the source of this lower bound and demonstrate that it arises from the interaction between the two theories, by establishing an upper bound for a generalization of the restricted multiplicative theory in isolation."
  bibtex: |
    @inproceedings{le2018treeshare,
      author    = {Le, Xuan-Bach and Hobor, Aquinas and Lin, Anthony W.},
      title     = {Complexity Analysis of Tree Share Structure},
      booktitle = {Programming Languages and Systems (APLAS 2018)},
      pages     = {89--108},
      publisher = {Springer},
      year      = {2018}
    }
    
- id: "4"
  number: "[4]"
  authors: "With Aquinas Hobor"
  title: "Logical Reasoning for Disjoint Permissions"
  venue:
    name: "ESOP 2018"
    url: "https://www.etaps.org/2018/esop.html"
    location: "Thessaloniki, Greece"
    date: "April 2018"
  tags:
    - text: "Separation Logic"
      class: "verification"
    - text: "Fractional Permissions"
      class: "verification"
    - text: "Decision Procedures"
      class: "logic"
  links:
    - type: "paper"
      url: "/publication/esop18full.pdf"
      icon: "📄"
    - type: "slides"
      url: "/slides/esop18_slides.pdf"
      icon: "📊"
    - type: "tool"
      url: "https://github.com/lexuanbach/share-infer"
      icon: "🔧"
  abstract: "Resource sharing is a fundamental phenomenon in concurrent programming, where multiple threads hold permissions to access a common resource. Verification logics must therefore capture permission ownership and transfer.<br><br>A common approach is to use rational numbers in $(0,1]$ as permissions, where 1 represents full permission and fractional values represent partial ownership. However, rational permissions are not a natural fit for separation logic, as they weaken its essential notion of disjointness.<br><br>We propose a general logical framework that supports permission reasoning in separation logic while preserving disjointness. Our framework enables sophisticated verification tasks such as induction over heap finiteness within the object logic, biabductive inference, and proofs of precision for recursive predicates within the object logic.<br><br>We introduce <strong>scaling separation algebras</strong>, a compositional extension of separation algebras, to model our logic and construct a concrete semantic model. We also developed the <strong>ShareInfer</strong> tool to benchmark our techniques."
  bibtex: |
    @inproceedings{le2018disjoint,
      author    = {Le, Xuan-Bach and Hobor, Aquinas},
      title     = {Logical Reasoning for Disjoint Permissions},
      booktitle = {Programming Languages and Systems (ESOP 2018)},
      pages     = {385--414},
      publisher = {Springer},
      year      = {2018}
    }
    
