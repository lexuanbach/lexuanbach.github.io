- id: "16"
  number: "[16]"
  authors: "With Huu-Thanh Phan & Tho Quan"
  title: "Uncertainty-Aware Forecasting and Inventory Optimization for ATM Cash Management in Vietnam"
  venue:
    name: "FLINS-ISKE 2026"
    url: ""
    location: "Sydney, Australia"
    date: "July 2026"
  tags:
    - text: "Forecasting"
      class: "ai"
    - text: "Inventory Optimization"
      class: "ai"
    - text: "Decision-Centric AI"
      class: "ai"
  links:
    - type: "paper"
      url: "/publication/FLINS2026.pdf"
      icon: "📄"
    - type: "slides"
      url: "/slides/FLINS2026_slides.pdf"
      icon: "📊"
  abstract: "ATM networks remain essential cash-distribution infrastructure in cash-intensive economies such as Vietnam, where replenishment decisions must balance idle capital against stockout risk.<br><br>We evaluate a forecast-then-optimize framework that combines probabilistic forecasting models with a periodic-review base-stock policy using daily withdrawal data from 84 ATMs over 3.7 years. Across 30 forecasting configurations, global neural quantile models substantially outperform classical baselines in downstream inventory performance.<br><br>The results show that forecast accuracy alone is not a reliable proxy for business impact: models with similar prediction error can yield markedly different replenishment costs. The study also highlights ATM-level heterogeneity and supports a monitoring-based deployment strategy that adapts model assignments according to realized cost while maintaining high service levels."
  bibtex: |
    @inproceedings{phan2026atm,
      author    = {Phan, Huu-Thanh and Le, Xuan-Bach and Quan, Tho},
      title     = {Uncertainty-Aware Forecasting and Inventory Optimization for ATM Cash Management in Vietnam},
      booktitle = {Proceedings of FLINS-ISKE 2026},
      year      = {2026},
      address   = {Sydney, Australia}
    }

- id: "15"
  number: "[15]"
  authors: "With Dung-Cam Quang, Vinh Q. Vo & Tho Quan"
  title: "The Paradigm Shift in Event Extraction: An In-Depth Overview with Large Language Models"
  venue:
    name: "IEA/AIE 2026"
    url: "https://www.i-somet.org/iea-aie2026/cfp.html"
    location: "Kuala Lumpur, Malaysia"
    date: "July 2026"
  tags:
    - text: "Event Extraction"
      class: "nlp"
    - text: "Large Language Models"
      class: "nlp"
    - text: "Survey"
      class: "ai"
  links:
    - type: "paper"
      url: "/publication/IEA2026d.pdf"
      icon: "📄"
  abstract: "Large language models (LLMs) have substantially advanced event extraction, a long-standing information extraction task that has evolved from rule-based and classical machine learning systems to modern deep learning approaches.<br><br>This survey provides an up-to-date overview of LLM-based event extraction methods, organizing them around two main strategies: using LLMs for data augmentation and using prompting or fine-tuning to address the task directly.<br><br>In contrast to prior surveys, the paper also places special emphasis on datasets, covering resources across multiple languages including English, Chinese, and Vietnamese, with attention to domain-specific settings and annotation scope.<br><br>The paper concludes with a critical analysis of current challenges and outlines promising future directions for advancing event extraction with LLMs."
